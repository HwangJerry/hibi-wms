apiVersion: v1
kind: Service
metadata:
  name: hibi-realtime
  namespace: hibi-portal
  labels:
    app.kubernetes.io/name: hibi-realtime
    app.kubernetes.io/part-of: hibi-portal
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hibi-realtime
  ports:
    - name: websocket
      port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hibi-realtime
  namespace: hibi-portal
  labels:
    app.kubernetes.io/name: hibi-realtime
    app.kubernetes.io/part-of: hibi-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hibi-realtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hibi-realtime
        app.kubernetes.io/part-of: hibi-portal
    spec:
      containers:
        - name: realtime
          image: server-main:30500/hibi-wms-realtime:main
          imagePullPolicy: Always
          ports:
            - name: websocket
              containerPort: 3001
          env:
            - name: REALTIME_HOST
              value: "0.0.0.0"
            - name: REALTIME_PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hibi-app-secrets
                  key: DATABASE_URL
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
