apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hibi-web
  namespace: hibi-portal
  labels:
    app.kubernetes.io/name: hibi-web
    app.kubernetes.io/part-of: hibi-portal
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`web.hibi.internal`) && PathPrefix(`/trpc`)
      priority: 100
      services:
        - name: hibi-api
          port: 3000
    - kind: Rule
      match: Host(`web.hibi.internal`) && PathPrefix(`/realtime`)
      priority: 100
      services:
        - name: hibi-realtime
          port: 3001
    - kind: Rule
      match: Host(`web.hibi.internal`)
      priority: 1
      services:
        - name: hibi-web
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hibi-api
  namespace: hibi-portal
  labels:
    app.kubernetes.io/name: hibi-api
    app.kubernetes.io/part-of: hibi-portal
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`api.example.internal`)
      services:
        - name: hibi-api
          port: 3000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hibi-realtime
  namespace: hibi-portal
  labels:
    app.kubernetes.io/name: hibi-realtime
    app.kubernetes.io/part-of: hibi-portal
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`realtime.example.internal`)
      services:
        - name: hibi-realtime
          port: 3001
