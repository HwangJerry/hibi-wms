apiVersion: v1
kind: Service
metadata:
  name: hibi-web
  namespace: hibi-portal
  labels:
    app.kubernetes.io/name: hibi-web
    app.kubernetes.io/part-of: hibi-portal
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hibi-web
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hibi-web
  namespace: hibi-portal
  labels:
    app.kubernetes.io/name: hibi-web
    app.kubernetes.io/part-of: hibi-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hibi-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hibi-web
        app.kubernetes.io/part-of: hibi-portal
    spec:
      containers:
        - name: web
          image: server-main:30500/hibi-wms-web:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 384Mi
