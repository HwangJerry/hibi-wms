apiVersion: v1
kind: Secret
metadata:
  name: hibi-app-secrets
  namespace: hibi-portal
  labels:
    app.kubernetes.io/name: hibi-portal
    app.kubernetes.io/part-of: hibi-portal
type: Opaque
stringData:
  DATABASE_URL: postgresql://hibi:REPLACE_ME_DB_PASSWORD@hibi-postgres.hibi-portal.svc.cluster.local:5432/hibi_portal
  SESSION_SECRET: REPLACE_ME_SESSION_SECRET
  R2_ACCOUNT_ID: REPLACE_ME_R2_ACCOUNT_ID
  R2_ACCESS_KEY_ID: REPLACE_ME_R2_ACCESS_KEY_ID
  R2_SECRET_ACCESS_KEY: REPLACE_ME_R2_SECRET_ACCESS_KEY
  R2_BUCKET_NAME: REPLACE_ME_R2_BUCKET_NAME
  R2_ENDPOINT: REPLACE_ME_R2_ENDPOINT
---
apiVersion: v1
kind: Secret
metadata:
  name: hibi-postgres
  namespace: hibi-portal
  labels:
    app.kubernetes.io/name: hibi-postgres
    app.kubernetes.io/part-of: hibi-portal
type: Opaque
stringData:
  POSTGRES_PASSWORD: REPLACE_ME_POSTGRES_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: hibi-cloudflared
  namespace: hibi-portal
  labels:
    app.kubernetes.io/name: hibi-cloudflared
    app.kubernetes.io/part-of: hibi-portal
type: Opaque
stringData:
  CLOUDFLARED_TUNNEL_TOKEN: REPLACE_ME_CLOUDFLARED_TUNNEL_TOKEN
