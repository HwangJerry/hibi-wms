apiVersion: v1
kind: Namespace
metadata:
  name: hibi-portal
---
apiVersion: v1
kind: Service
metadata:
  name: hibi-postgres
  namespace: hibi-portal
  labels:
    app.kubernetes.io/name: hibi-postgres
    app.kubernetes.io/part-of: hibi-portal
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: hibi-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: hibi-postgres-nodeport
  namespace: hibi-portal
  labels:
    app.kubernetes.io/name: hibi-postgres
    app.kubernetes.io/part-of: hibi-portal
spec:
  type: NodePort
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      nodePort: 30432
  selector:
    app.kubernetes.io/name: hibi-postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hibi-postgres
  namespace: hibi-portal
  labels:
    app.kubernetes.io/name: hibi-postgres
    app.kubernetes.io/part-of: hibi-portal
spec:
  serviceName: hibi-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hibi-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hibi-postgres
        app.kubernetes.io/part-of: hibi-portal
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: master-node
                    operator: In
                    values:
                      - "yes"
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: hibi_portal
            - name: POSTGRES_USER
              value: hibi
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hibi-postgres
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - hibi
                - -d
                - hibi_portal
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - hibi
                - -d
                - hibi_portal
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 20Gi
