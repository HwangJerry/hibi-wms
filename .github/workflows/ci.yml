name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: 100.74.225.115:30500
  IMAGE_NAMESPACE: hibi-wms

jobs:
  ci-gate:
    name: CI gate
    if: always()
    needs: [quality-and-build, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Ensure full suite and E2E passed
        run: |
          if [[ "${{ needs.quality-and-build.result }}" != "success" ]]; then
            echo "quality-and-build failed or was skipped."
            exit 1
          fi

          if [[ "${{ needs.e2e.result }}" != "success" ]]; then
            echo "E2E failed or was skipped."
            exit 1
          fi

          echo "CI gate passed."

  quality-and-build:
    name: Quality and project build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20.19.3"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build design tokens
        run: pnpm tokens:build

  e2e:
    name: E2E critical flows
    runs-on: ubuntu-latest
    needs: quality-and-build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hibi_portal
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/hibi_portal?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20.19.3"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Seed database
        run: |
          pnpm db:seed
          pnpm exec tsx scripts/seed-e2e-fixtures.ts

      - name: Run E2E
        run: pnpm e2e:ci

  publish-images:
    name: Build and publish images
    needs: [ci-gate]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            dockerfile: apps/web/Dockerfile
          - service: api
            dockerfile: packages/api/Dockerfile
          - service: realtime
            dockerfile: apps/realtime/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.service }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
